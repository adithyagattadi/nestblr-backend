ktor:
  application:
    modules:
      - com.nestblr.ApplicationKt.module
  deployment:
    port: "$PORT:8080"

database:
  url: "$DATABASE_URL:jdbc:postgresql://localhost:5432/nestblr"
  user: "$DATABASE_USER:nestblr"
  password: "$DATABASE_PASSWORD:nestblr_dev_password"
  maxPoolSize: "$DATABASE_MAX_POOL_SIZE:10"
